name: CI

on:
  push:
    branches:
      - master
      - feature/**
  pull_request:

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -v

      - name: Run replay CLI
        run: |
          egd-dlms-replay tests/data/sample_push_frame.hex

      - name: Run decode CLI
        run: |
          egd-dlms-decode tests/data/sample_push_frame.hex

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t egd-dlms:test .
